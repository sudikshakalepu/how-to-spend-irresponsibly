<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedOut | How to Spend Irresponsibly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <img src="logo.png" alt="LinkedOut" onclick="navClick('home')" style="height:34px;cursor:pointer;display:block;">
        <div class="nav-search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search for bad financial decisions..." readonly>
        </div>
      </div>
      <div class="nav-links">
        <button class="nav-btn active" onclick="goToSection(0,true)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-btn" onclick="navClick('network')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>My Network</span>
        </button>
        <button class="nav-btn" onclick="navClick('jobs')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          <span>Jobs</span>
        </button>
        <button class="nav-btn" onclick="navClick('msg')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Messaging</span>
        </button>
        <button class="nav-btn" onclick="navClick('notif')" style="position:relative;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notif-badge" class="notif-badge">0</span>
          <span>Notifications</span>
        </button>
        <button class="nav-btn" onclick="navClick('me')">
          <span style="font-size:20px;line-height:1;">😎</span>
          <span>Me ▾</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN APP -->
  <div id="app">
    <aside id="left-sidebar"></aside>
    <div id="feed-wrap">
      <div id="feed-container">
        <div id="feed-inner">
          <div class="section" id="section-0"></div>
          <div class="section" id="section-1"></div>
          <div class="section" id="section-2"></div>
          <div class="section" id="section-3"></div>
          <div class="section" id="section-4"></div>
        </div>
      </div>
      <div id="section-dots">
        <button class="dot active" data-n="0" onclick="goToSection(0,true)" title="Intro"></button>
        <button class="dot"        data-n="1" onclick="goToSection(1,true)" title="Step 1 · Impulse Buy"></button>
        <button class="dot locked" data-n="2" onclick="goToSection(2)"      title="Step 2 · Savings"></button>
        <button class="dot locked" data-n="3" onclick="goToSection(3)"      title="Step 3 · Investing"></button>
        <button class="dot locked" data-n="4" onclick="goToSection(4)"      title="Certificate"></button>
      </div>
    </div>
    <aside id="right-sidebar"></aside>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay" onclick="overlayClick(event)" style="display:none;">
    <div id="modal-box">
      <div id="modal-inner"></div>
    </div>
  </div>

  <!-- REACTION POPUP — hidden by default (inline + css) -->
  <div id="reaction-popup" style="display:none;">
    <button class="r-btn" data-r="👍" onclick="pickReaction('👍')"><span class="r-icon">👍</span><span class="r-label">Like</span></button>
    <button class="r-btn" data-r="💡" onclick="pickReaction('💡')"><span class="r-icon">💡</span><span class="r-label">Insightful</span></button>
    <button class="r-btn" data-r="❤️" onclick="pickReaction('❤️')"><span class="r-icon">❤️</span><span class="r-label">Love</span></button>
    <button class="r-btn" data-r="🎉" onclick="pickReaction('🎉')"><span class="r-icon">🎉</span><span class="r-label">Celebrate</span></button>
    <button class="r-btn r-cart" data-r="🛒" onclick="pickReaction('🛒')"><span class="r-icon">🛒</span><span class="r-label">Cart It</span></button>
  </div>

  <!-- TOAST -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
